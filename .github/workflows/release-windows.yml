name: Release Windows (signed)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version part to bump"
        required: true
        default: "patch"
        type: choice
        options:
          - major
          - minor
          - patch
      confirm_major:
        description: "Type CONFIRM-MAJOR-BUMP if (and only if) bump=major"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  id-token: write

env:
  QT_VERSION: 6.9.2
  AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
  AZURE_ARTIFACT_SIGNING_ACCOUNT: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
  AZURE_ARTIFACT_SIGNING_CERT_PROFILE: ${{ vars.AZURE_ARTIFACT_SIGNING_CERT_PROFILE }}

jobs:
  build-sign-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gate major bumps behind explicit confirmation
        shell: pwsh
        run: |
          $bump    = "${{ github.event.inputs.bump }}"
          $confirm = "${{ github.event.inputs.confirm_major }}"
          if ($bump -eq "major" -and $confirm -ne "CONFIRM-MAJOR-BUMP") {
            Write-Error "Major version bump requires confirm_major=CONFIRM-MAJOR-BUMP. Re-run with the confirmation typed exactly."
            exit 1
          }
          if ($bump -ne "major" -and $confirm -eq "CONFIRM-MAJOR-BUMP") {
            Write-Error "confirm_major is set but bump=$bump, not major. Clear confirm_major or change bump to major."
            exit 1
          }
          Write-Host "Gate passed: bump=$bump"

      - name: Bump version
        id: bump
        shell: pwsh
        run: |
          $bump = "${{ github.event.inputs.bump }}"
          $current = (Get-Content VERSION -Raw).Trim()
          $parts = $current.Split('.')
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]

          switch ($bump) {
            "major" { $major++; $minor = 0; $patch = 0 }
            "minor" { $minor++; $patch = 0 }
            "patch" { $patch++ }
          }

          $ver = "$major.$minor.$patch"
          $ver | Set-Content VERSION -NoNewline

          # Keep CMakeLists.txt project() version in sync
          $cmake = Get-Content clients/windows/CMakeLists.txt -Raw
          $cmake = $cmake -replace 'project\(SHROUD VERSION \d+\.\d+\.\d+', "project(SHROUD VERSION $ver"
          Set-Content clients/windows/CMakeLists.txt -Value $cmake -NoNewline

          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: ""
          cache: true

      - name: Configure CMake
        shell: pwsh
        working-directory: clients/windows
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_FLAGS="/Brepro" `
            -DCMAKE_CXX_FLAGS="/Brepro" `
            -DCMAKE_EXE_LINKER_FLAGS="/Brepro"

      - name: Build shroud.exe
        shell: pwsh
        working-directory: clients/windows
        run: cmake --build build --config Release

      - name: Deploy Qt DLLs (windeployqt)
        shell: pwsh
        working-directory: clients/windows
        run: |
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          Copy-Item "build/shroud.exe" "dist/shroud.exe"
          windeployqt --release --no-translations --no-system-d3d-compiler --no-opengl-sw "dist/shroud.exe"

      - name: Azure login (OIDC federated)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign shroud.exe with Azure Artifact Signing
        uses: azure/trusted-signing-action@v0.5.1
        with:
          endpoint: ${{ env.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.AZURE_ARTIFACT_SIGNING_CERT_PROFILE }}
          files-folder: clients/windows/dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Package release zip
        id: package
        shell: pwsh
        working-directory: clients/windows
        run: |
          $ver = "${{ steps.bump.outputs.version }}"
          $zipName = "SHROUD-v$ver-win64.zip"
          Compress-Archive -Path "dist/*" -DestinationPath $zipName -Force

          $zipHash = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLower()
          "$zipHash  $zipName" | Set-Content "SHA256SUMS.txt" -NoNewline

          "zip=clients/windows/$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "sha=clients/windows/SHA256SUMS.txt" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "zipname=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ─── MSI build (best-effort) ──────────────────────────────────────
      # The caphyon/advinst-github-action wants an Advanced Installer
      # license file we don't have on the runner — without it the action
      # exits with "Parse config ini file error" and the MSI build
      # cannot run in CI. We mark these steps continue-on-error so the
      # release still ships the signed exe + Qt DLLs (currently as a
      # zip — to be replaced by a locally-built MSI uploaded by the
      # operator). When the AI license path is sorted, drop the
      # continue-on-error and the zip too.
      - name: Install Advanced Installer
        id: advinst_install
        continue-on-error: true
        uses: caphyon/advinst-github-action@v2.0
        with:
          advinst-version: "19.9"
          advinst-enable-automation: "true"

      - name: Build MSI installer
        id: msi
        if: steps.advinst_install.outcome == 'success'
        continue-on-error: true
        shell: pwsh
        run: |
          pwsh -File clients/windows/installer/build-msi.ps1 `
            -DistDir clients/windows/dist `
            -OutDir clients/windows/installer/out `
            -Version "${{ steps.bump.outputs.version }}"

          $ver = "${{ steps.bump.outputs.version }}"
          $msiName = "SHROUD-v$ver-win64.msi"
          $msiPath = Get-ChildItem -Path clients/windows/installer/out -Recurse -Filter $msiName | Select-Object -First 1
          if (-not $msiPath) { throw "MSI not produced" }

          # Stage MSI next to the zip so Azure signing folder filter picks it up
          $stagedMsi = Join-Path "clients/windows/dist" $msiName
          Copy-Item $msiPath.FullName $stagedMsi -Force

          "msi=clients/windows/dist/$msiName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "msiname=$msiName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Sign MSI with Azure Artifact Signing
        if: steps.msi.outcome == 'success'
        continue-on-error: true
        uses: azure/trusted-signing-action@v0.5.1
        with:
          endpoint: ${{ env.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.AZURE_ARTIFACT_SIGNING_CERT_PROFILE }}
          files-folder: clients/windows/dist
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Compute MSI hash + extend SHA256SUMS
        id: msihash
        if: steps.msi.outcome == 'success'
        continue-on-error: true
        shell: pwsh
        working-directory: clients/windows
        run: |
          $msiName = "${{ steps.msi.outputs.msiname }}"
          $msiPath = Join-Path "dist" $msiName
          $msiHash = (Get-FileHash $msiPath -Algorithm SHA256).Hash.ToLower()
          Add-Content -Path "SHA256SUMS.txt" -Value "`n$msiHash  $msiName" -NoNewline
          "msihash=$msiHash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build release notes
        id: notes
        shell: pwsh
        run: |
          $tag = "${{ steps.bump.outputs.tag }}"
          $prevTag = git describe --tags --abbrev=0 "$tag^" 2>$null
          if (-not $prevTag) { $prevTag = "" }

          # CRITICAL: `git log` returns an array of strings in PowerShell.
          # String-interpolating an array uses $OFS (default: single space),
          # which collapses every commit onto one line. -join "`n" forces
          # real newlines so the Markdown bullet list actually renders.
          if ($prevTag) {
            $commitLines = git log "$prevTag..HEAD" --pretty=format:"- %s" --no-merges
          } else {
            $commitLines = git log HEAD --pretty=format:"- %s" --no-merges
          }
          if (-not $commitLines) { $commitLines = @("- Internal updates and improvements") }
          $commits = ($commitLines -join "`n")

          # Build the body line-by-line. NO PowerShell here-string — the
          # YAML run block's baseline indent gets preserved differently
          # by `pwsh` vs `powershell.exe`, and a 4-space indent kills
          # Markdown rendering by tripping the indented-code-block rule.
          $msiName = "${{ steps.msi.outputs.msiname }}"
          $zipName = "${{ steps.package.outputs.zipname }}"
          $repo    = "${{ github.repository }}"
          $haveMsi = -not [string]::IsNullOrEmpty($msiName)

          $lines = @(
            "## Changes",
            "",
            $commits,
            "",
            "### Windows",
            ""
          )
          if ($haveMsi) {
            $lines += "Both the **MSI installer** and the **``shroud.exe``** inside it are Authenticode-signed via Azure Artifact Signing — Windows shows **Verified publisher: Brent Gordon** at install time and on every launch."
            $lines += ""
            $lines += "- **``$msiName``** _(recommended)_ — double-click to install. Adds Start Menu + Desktop shortcuts, registers in *Apps & Features* for clean uninstall, performs a Major Upgrade if an older version is present."
            $lines += "- **``$zipName``** — portable; extract anywhere and run ``shroud.exe`` directly. No installer, no registry changes."
          } else {
            $lines += "Download **``$zipName``** and extract. ``shroud.exe`` is Authenticode-signed via Azure Artifact Signing — Windows shows **Verified publisher: Brent Gordon** on every launch."
          }
          $lines += ""
          $lines += "Verify the SHA-256 of whichever file you download against ``SHA256SUMS.txt`` before installing."
          $lines += ""
          $lines += "> Android APK and the threshold multisig manifest are added manually after this build per the project's reproducibility process — see [BUILD-REPRODUCIBILITY.md](https://github.com/$repo/blob/main/BUILD-REPRODUCIBILITY.md)."
          if ($prevTag) {
            $lines += ""
            $lines += "**Full Changelog:** https://github.com/$repo/compare/$prevTag...$tag"
          }
          $body = ($lines -join "`n")

          $delim = "EOF_NOTES_$([guid]::NewGuid().ToString('N'))"
          # ASCII (no BOM) — required by the GITHUB_OUTPUT parser.
          Add-Content -Path $env:GITHUB_OUTPUT -Value "body<<$delim" -Encoding ascii
          Add-Content -Path $env:GITHUB_OUTPUT -Value $body          -Encoding ascii
          Add-Content -Path $env:GITHUB_OUTPUT -Value $delim         -Encoding ascii

      - name: Commit version bump
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION clients/windows/CMakeLists.txt
          git commit -m "v${{ steps.bump.outputs.version }} - signed Windows release"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: SHROUD ${{ steps.bump.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          # MSI is conditional — see the MSI build block. When the
          # Advanced Installer step fails (no license on the runner),
          # steps.msi.outputs.msi is empty and softprops just skips the
          # missing file rather than failing.
          files: |
            ${{ steps.package.outputs.zip }}
            ${{ steps.msi.outputs.msi }}
            ${{ steps.package.outputs.sha }}
          fail_on_unmatched_files: false
